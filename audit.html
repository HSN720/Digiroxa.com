<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Audit | Digiroxa</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header style="padding:20px;background:white;border-bottom:1px solid #ddd;">
    <h1 style="font-weight:bold;">DIGIROXA</h1>
  </header>

  <!-- MAIN -->
  <main style="max-width:900px;margin:auto;padding:40px;">

    <h2 style="font-size:32px;font-weight:800;">Get a Free Marketing Audit</h2>
    <p style="margin-top:10px;color:#555;">
      We analyze your ads, website, and strategy to find what's costing you leads.
    </p>

    <!-- FORM (100% WORKING) -->
    <div style="background:white;padding:25px;margin-top:30px;border-radius:12px;">

      <form action="https://formspree.io/f/xwvavnoj" method="POST">

        <input
          type="text"
          name="name"
          placeholder="Name"
          required
          style="width:100%;padding:12px;margin-bottom:12px;border:1px solid #ccc;border-radius:8px;"
        />

        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          style="width:100%;padding:12px;margin-bottom:12px;border:1px solid #ccc;border-radius:8px;"
        />

        <input
          type="text"
          name="business"
          placeholder="Business Name"
          required
          style="width:100%;padding:12px;margin-bottom:12px;border:1px solid #ccc;border-radius:8px;"
        />

        <button
          type="submit"
          style="width:100%;padding:12px;background:#1D4ED8;color:white;border:none;border-radius:8px;font-weight:bold;"
        >
          Get My Free Audit
        </button>

      </form>

      <p style="font-size:12px;color:#777;margin-top:15px;">
        You'll receive your audit within 24–48 hours.
      </p>

    </div>

  </main>

  <!-- FOOTER -->
  <footer style="text-align:center;padding:30px;background:#111;color:white;margin-top:50px;">
    Digiroxa © 2026
  </footer>

</body>
</html>
