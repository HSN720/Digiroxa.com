<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plans | Digiroxa</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#1D4ED8",
            accent: "#F59E0B",
            surface: "#F3F4F6",
            ink: "#0F172A"
          }
        }
      }
    }
  </script>

  <style>
    body { background:#F3F4F6; }
    .plan-card { position:relative; z-index:10; }
  </style>
</head>

<body class="text-ink">

<main class="mx-auto max-w-7xl px-6 py-20">

  <!-- HEADER -->
  <section class="text-center">
    <h1 class="text-5xl font-black">Choose your growth plan</h1>
    <p class="mt-6 text-lg text-slate-600">
      Simple, clear plans built to grow your business.
    </p>
  </section>

  <!-- PLANS -->
  <section class="mt-14 grid gap-6 lg:grid-cols-3">

    <!-- STARTER -->
    <div class="plan-card rounded-3xl bg-white p-8 shadow">
      <h2 class="text-2xl font-bold">Starter</h2>

      <a href="audit.html"
         class="mt-8 block w-full text-center rounded-full border px-6 py-4 font-semibold hover:scale-105 transition">
        Get Started
      </a>
    </div>

    <!-- GROWTH (FIXED) -->
    <div class="plan-card rounded-3xl border-2 border-primary bg-white p-8 shadow">

      <p class="text-primary font-semibold">Most Popular</p>
      <h2 class="text-3xl font-black mt-2">Growth</h2>

      <!-- ✅ FIXED BUTTON -->
      <div style="position:relative; z-index:50;">
        <a href="contact.html"
           class="mt-8 block w-full text-center px-6 py-4 font-semibold rounded-full bg-primary text-white hover:scale-105 transition"
           style="opacity:1; visibility:visible;">
          Start My Growth Plan
        </a>
      </div>

    </div>

    <!-- PREMIUM -->
    <div class="plan-card rounded-3xl bg-white p-8 shadow">
      <h2 class="text-2xl font-bold">Premium</h2>

      <a href="contact.html"
         class="mt-8 block w-full text-center rounded-full border px-6 py-4 font-semibold hover:scale-105 transition">
        Talk to an Expert
      </a>
    </div>

  </section>

  <!-- ALL IN ONE (FIXED) -->
  <section class="mt-16 rounded-3xl bg-slate-900 p-10 text-white">

    <h2 class="text-3xl font-black">Everything under one growth system</h2>

    <!-- ✅ FIXED BUTTON -->
    <div style="position:relative; z-index:50;">
      <a href="audit.html"
         class="mt-8 block w-full text-center px-6 py-4 font-semibold rounded-full bg-accent text-black hover:scale-105 transition"
         style="opacity:1; visibility:visible;">
        Get This Plan
      </a>
    </div>

  </section>

</main>

</body>
</html>
